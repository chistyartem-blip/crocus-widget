name: Ads Slim Search Rebuild

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Slim Search rebuild changes"
        type: boolean
        required: true
        default: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild Slim Search
        env:
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          SLIM_REBUILD_APPLY: ${{ inputs.apply && 'true' || 'false' }}
        run: node scripts/rebuild-slim-search.mjs

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slim-search-rebuild-report
          path: |
            reports/*.json
            reports/*.md
          if-no-files-found: ignore
