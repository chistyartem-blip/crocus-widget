name: Ads Budget Governor

on:
  schedule:
    # Hourly slot/campaign check. Telegram report is rate-limited inside the script.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply changes to Google Ads"
        type: boolean
        required: true
        default: false
      report_mode:
        description: "Report mode"
        type: choice
        required: false
        default: "deep"
        options:
          - small
          - deep
      budget_override_json:
        description: "Manual budget override JSON, for example {\"manikuere\":5}"
        type: string
        required: false
        default: ""
      manual_budget_only:
        description: "Only apply manual budget override, do not touch keyword bids"
        type: boolean
        required: false
        default: false

jobs:
  governor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ads-budget-governor
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run governor
        env:
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          ADS_GOVERNOR_APPLY: ${{ github.event_name == 'workflow_dispatch' && inputs.apply && 'true' || github.event_name != 'workflow_dispatch' && vars.ADS_GOVERNOR_APPLY || 'false' }}
          ADS_GOVERNOR_FORCE_TELEGRAM: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          ADS_GOVERNOR_REPORT_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.report_mode || '' }}
          ADS_GOVERNOR_BUDGET_OVERRIDE_JSON: ${{ github.event_name == 'workflow_dispatch' && inputs.budget_override_json || '' }}
          ADS_GOVERNOR_MANUAL_BUDGET_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.manual_budget_only && 'true' || 'false' }}
          ADS_GOVERNOR_MAX_DAILY_BUDGET_EUR: ${{ vars.ADS_GOVERNOR_MAX_DAILY_BUDGET_EUR || '25' }}
          ADS_GOVERNOR_LOOKAHEAD_DAYS: ${{ vars.ADS_GOVERNOR_LOOKAHEAD_DAYS || '21' }}
          ADS_GOVERNOR_REPORT_EVERY_HOURS: ${{ vars.ADS_GOVERNOR_REPORT_EVERY_HOURS || '3' }}
          ALTEGIO_PROXY_BASE: ${{ vars.ALTEGIO_PROXY_BASE || 'https://crocus-proxy.crocusbeautystudio.workers.dev/api/proxy' }}
          ALTEGIO_LOCATION_ID: ${{ vars.ALTEGIO_LOCATION_ID || '1357963' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_PROJECT_ID: ${{ secrets.OPENAI_PROJECT_ID }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: node scripts/ads-budget-governor.mjs

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ads-governor-report
          path: |
            reports/*.json
            reports/*.md
          if-no-files-found: ignore
