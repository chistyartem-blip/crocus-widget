name: Ads Tomorrow Manikure Push

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply tomorrow Manikure push"
        type: boolean
        required: true
        default: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Push tomorrow Manikure intent
        env:
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          TOMORROW_MANIKURE_PUSH_APPLY: ${{ inputs.apply && 'true' || 'false' }}
        run: node scripts/tomorrow-manikure-push.mjs

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tomorrow-manikure-push-report
          path: reports/*.json
          if-no-files-found: ignore
